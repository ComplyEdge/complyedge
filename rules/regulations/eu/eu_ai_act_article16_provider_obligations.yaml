id: EU_AI_ACT_ART16_PROVIDER_OBLIGATIONS_001
jurisdiction: EU
effective_date: '2026-08-02'
description: >-
  Establishes the comprehensive obligations of providers of high-risk AI
  systems: compliance with Section 2 requirements, identification on the
  product, quality management system, documentation, log retention, conformity
  assessment, EU declaration of conformity, CE marking, registration,
  corrective actions, demonstrating conformity on request, and accessibility
  compliance. Article 16.
detection_scope: all
conditions:
- type: semantic
  prompt: >-
    Determine whether the following text describes, requests, or facilitates
    placing a high-risk AI system on the EU market or putting it into service
    without satisfying the provider obligations in EU AI Act Article 16.
    Providers of high-risk AI systems shall: (a) ensure compliance with
    Section 2 requirements, (b) indicate provider name and contact address on
    the system or its packaging/documentation, (c) have a quality management
    system per Article 17, (d) keep documentation per Article 18, (e) keep
    automatically generated logs per Article 19 when under their control,
    (f) undergo conformity assessment per Article 43 prior to placing on
    market, (g) draw up an EU declaration of conformity per Article 47,
    (h) affix CE marking per Article 48, (i) comply with registration per
    Article 49(1), (j) take corrective actions per Article 20, (k) demonstrate
    conformity on reasoned request from a national competent authority, and
    (l) ensure accessibility per Directives (EU) 2016/2102 and (EU) 2019/882.
    Detect intent to skip conformity assessment, omit CE marking, bypass
    quality management, or place a high-risk AI system on the EU market
    without provider identification. Do NOT flag legitimate compliance
    workflows or discussions of these obligations.
  model: gpt-4
- type: regex
  value: >-
    ((?:place|placing|sell|deploy|launch|release)\w*\s+(?:high[\-\s]risk\s+AI|AI\s+system)\s+(?:on\s+(?:the\s+)?EU\s+market|in\s+(?:the\s+)?Union)\s+(?:without|lacking)\s+(?:CE\s+marking|conformity\s+assessment|EU\s+declaration|registration)|(?:no|without|skip|skipping|bypass|omit\w*)\s+(?:CE\s+marking|conformity\s+assessment|EU\s+declaration\s+of\s+conformity|quality\s+management\s+system|QMS|provider\s+registration|EU\s+database\s+registration)\s+(?:for|on)?\s+(?:high[\-\s]risk\s+AI|AI\s+system)?|(?:high[\-\s]risk\s+AI|AI\s+system)\s+(?:without|lacking|missing)\s+(?:provider\s+(?:name|identification|contact)|CE\s+mark\w*|conformity\s+(?:assessment|declaration)|quality\s+management)|(?:Article\s+16|Art\.?\s+16|provider\s+obligation)\s+(?:not\s+met|ignored|skipped|bypass\w*|circumvent\w*)|(?:no|without|skip\w*|bypass\w*)\s+(?:Article\s+43|Art\.?\s+43)\s+conformity\s+assessment|(?:provide|providing)\s+high[\-\s]risk\s+AI\s+(?:without|lacking)\s+(?:Annex\s+IV|technical\s+documentation|EU\s+declaration))
  flags: i
severity: high
category: prohibited_practice
source:
  regulation: EU AI Act
  article: Article 16
  url: https://eur-lex.europa.eu/eli/reg/2024/1689/oj
  last_updated: '2024-07-12'
  citation: >-
    Regulation (EU) 2024/1689, Article 16 (Obligations of providers of
    high-risk AI systems): Providers of high-risk AI systems shall: (a)
    ensure that their high-risk AI systems are compliant with the requirements
    set out in Section 2; (b) indicate on the high-risk AI system or, where
    that is not possible, on its packaging or its accompanying documentation,
    as applicable, their name, registered trade name or registered trade mark,
    the address at which they can be contacted; (c) have a quality management
    system in place which complies with Article 17; (d) keep the documentation
    referred to in Article 18; (e) when under their control, keep the logs
    automatically generated by their high-risk AI systems as referred to in
    Article 19; (f) ensure that the high-risk AI system undergoes the
    relevant conformity assessment procedure as referred to in Article 43,
    prior to its being placed on the market or put into service; (g) draw up
    an EU declaration of conformity in accordance with Article 47; (h) affix
    the CE marking to the high-risk AI system or, where that is not possible,
    on its packaging or its accompanying documentation, to indicate
    conformity with this Regulation, in accordance with Article 48; (i) comply
    with the registration obligations referred to in Article 49(1); (j) take
    the necessary corrective actions and provide information as required in
    Article 20; (k) upon a reasoned request of a national competent authority,
    demonstrate the conformity of the high-risk AI system with the
    requirements set out in Section 2; (l) ensure that the high-risk AI
    system complies with accessibility requirements in accordance with
    Directives (EU) 2016/2102 and (EU) 2019/882.
penalty_information:
  civil_penalties:
    eu_enforcement: Up to EUR 15,000,000 or 3% of worldwide annual turnover (Article 99)
remediation:
  action: block
  timing: proactive
  message: >-
    BLOCKED — EU AI Act Article 16 requires providers of high-risk AI systems
    to satisfy a comprehensive compliance checklist before placing the system
    on the EU market: Section 2 conformity, provider identification, QMS,
    documentation, logs, conformity assessment, EU declaration, CE marking,
    registration, corrective actions, demonstrability on request, and
    accessibility. Penalties: up to EUR 15M or 3% of global turnover.
  suggestion: >-
    Before placing a high-risk AI system on the EU market or putting it into
    service: (1) verify Section 2 compliance, (2) display provider name and
    contact address, (3) implement a QMS per Article 17, (4) maintain Annex IV
    documentation, (5) retain automatically generated logs, (6) complete the
    Article 43 conformity assessment, (7) draw up the EU declaration of
    conformity, (8) affix the CE marking, (9) register in the EU database,
    (10) plan corrective actions, (11) be ready to demonstrate conformity on
    request, and (12) meet accessibility requirements under Directives (EU)
    2016/2102 and (EU) 2019/882.
version: 1.0.0
