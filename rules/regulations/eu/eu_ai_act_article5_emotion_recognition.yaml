id: EU_AI_ACT_ART5_EMOTION_RECOGNITION_001
jurisdiction: EU
effective_date: '2025-02-02'
description: >-
  Prohibits the use of AI systems to infer emotions of a natural person in
  the areas of workplace and educational institutions. Article 5(1)(f) of the
  EU AI Act. Narrow medical and safety exceptions apply.
detection_scope: all
conditions:
- type: semantic
  prompt: >-
    Determine whether the following text describes, requests, or facilitates
    an AI system that infers or detects the emotional state (e.g., happiness,
    anger, fear, stress, engagement, attentiveness) of employees, students,
    or other natural persons in a workplace or educational setting. This is
    prohibited under EU AI Act Article 5(1)(f), except for medical or safety
    reasons (e.g., detecting pilot fatigue, monitoring patient distress).
  model: gpt-4
- type: regex
  value: (emotion[- ]?(recognition|detect|infer|classif|analys)|sentiment\s+(of|in)\s+(employee|student|worker|pupil|staff)|(track|detect|monitor|score|analys|measur)\w*\s+(employee|student|worker|staff|pupil)s?\s+(emotion|mood|engagement|attentiveness|stress|fatigue)|(employee|student|worker|staff|pupil)s?\s+(emotion|mood|engagement|attentiveness|stress|fatigue)\s+(monitor|detect|track|score|analys)|workplace\s+emotion|classroom\s+emotion|engagement\s+(recognition|detection)\s+(in|for)\s+(students|employees|classroom|workplace)|mood\s+monitor(ing)?\s+(at\s+work|in\s+(the\s+)?classroom|for\s+(students|employees)))
  flags: i
severity: critical
category: prohibited_practice
source:
  regulation: EU AI Act
  article: Article 5(1)(f)
  url: https://eur-lex.europa.eu/eli/reg/2024/1689/oj
  last_updated: '2024-07-12'
  citation: >-
    Regulation (EU) 2024/1689, Article 5(1)(f): The placing on the market,
    the putting into service for this specific purpose, or the use of AI
    systems to infer emotions of a natural person in the areas of workplace
    and education institutions, except where the use of the AI system is
    intended to be put in place or into the market for medical or safety
    reasons.
remediation:
  action: block
  timing: proactive
  message: >-
    BLOCKED — EU AI Act Article 5(1)(f) prohibits AI emotion recognition of
    persons in workplace or educational institutions. This is banned in the
    EU since February 2, 2025. Medical or safety use cases may qualify for
    the narrow exception but require documented justification. Penalties:
    up to €35M or 7% of global revenue.
  suggestion: >-
    Remove workplace/classroom emotion detection. If the use case is a
    medical or safety application (e.g., detecting pilot fatigue, monitoring
    patient distress), document the medical/safety purpose and consult legal
    counsel about the Article 5(1)(f) exception before deployment.
version: 1.0.0
tags:
- eu-ai-act
- article-5
- prohibited-practice
- emotion-recognition
- workplace
- education
- proactive
tier: enterprise
