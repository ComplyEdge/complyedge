id: GDPR_DATA_MINIMIZATION_001
jurisdiction: EU
effective_date: '2018-05-25'
description: Personal data collection must be adequate, relevant and limited to what
  is necessary
conditions:
- type: semantic
  prompt: Does this request collect more personal data than necessary for the stated
    purpose? Consider if each data field is directly relevant and needed.
  model: gpt-5.4
- type: regex
  value: (collect|gather|request).*(personal|sensitive) (data|information)
  flags: i
severity: medium
category: privacy
source:
  regulation: GDPR
  article: Article 5(1)(c)
  url: https://eur-lex.europa.eu/eli/reg/2016/679/oj
  last_updated: '2016-04-27'
remediation:
  action: warn
  message: Data collection may violate GDPR data minimization principle
  suggestion: Review if all requested data fields are necessary for the stated purpose
version: 1.0.0
tags:
- data_minimization
- personal_data
- collection
