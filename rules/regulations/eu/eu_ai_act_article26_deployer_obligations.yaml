id: EU_AI_ACT_ART26_DEPLOYER_OBLIGATIONS_001
jurisdiction: EU
effective_date: '2026-08-02'
description: >-
  Requires deployers of high-risk AI systems to use such systems in accordance
  with instructions, assign human oversight to competent persons, ensure input
  data is relevant and representative, monitor operation, keep auto-generated
  logs for at least six months, and cooperate with competent authorities.
  Article 26.
detection_scope: all
conditions:
- type: semantic
  prompt: >-
    Determine whether the following text describes, requests, or facilitates
    deploying a high-risk AI system in violation of the deployer obligations
    under EU AI Act Article 26. Deployers must: (1) take appropriate technical
    and organisational measures to use systems in accordance with instructions
    for use, (2) assign human oversight to natural persons with necessary
    competence, training, and authority, (3) ensure input data is relevant and
    sufficiently representative for the intended purpose, (4) monitor operation
    and inform providers of risks or serious incidents without undue delay,
    (5) keep automatically generated logs for at least six months, (6) inform
    workers before workplace deployment, and (7) cooperate with competent
    authorities. Deployers making decisions affecting natural persons must
    inform them of the AI system's use.
  model: gpt-4
- type: regex
  value: >-
    (deploy(?:ing|er)?\s+without\s+(?:instructions|oversight|monitoring|logs)|no\s+(?:deployer\s+)?(?:obligations?|compliance|oversight)\s+(?:for|with)\s+(?:high[\-\s]risk|ai)|ignor(?:e|ing)\s+(?:instructions?\s+for\s+use|deployer\s+obligations)|no\s+(?:log\s+retention|auto(?:matic)?\s+log|incident\s+report)|fail(?:ing|ure)?\s+to\s+(?:monitor|inform\s+(?:workers?|provider|authority)|keep\s+logs|assign\s+(?:human|oversight))|input\s+data\s+(?:not\s+)?(?:representative|relevant|validated)|without\s+(?:competent|trained)\s+(?:oversight|personnel)|deploy(?:ing)?\s+(?:ai\s+)?without\s+(?:inform|noti)(?:ing|fication))
  flags: i
severity: high
category: consumer_protection
source:
  regulation: EU AI Act
  article: Article 26
  url: https://eur-lex.europa.eu/eli/reg/2024/1689/oj
  last_updated: '2024-07-12'
  citation: >-
    Regulation (EU) 2024/1689, Article 26(1): Deployers of high-risk AI systems
    shall take appropriate technical and organisational measures to ensure they
    use such systems in accordance with the instructions for use accompanying
    the systems. Article 26(2): Deployers shall assign human oversight to
    natural persons who have the necessary competence, training and authority,
    as well as the necessary support. Article 26(4): the deployer shall ensure
    that input data is relevant and sufficiently representative in view of the
    intended purpose of the high-risk AI system. Article 26(6): Deployers of
    high-risk AI systems shall keep the logs automatically generated by that
    high-risk AI system to the extent such logs are under their control, for a
    period appropriate to the intended purpose of the high-risk AI system, of
    at least six months.
penalty_information:
  civil_penalties:
    sec_enforcement: Up to EUR 15,000,000 or 3% of worldwide annual turnover
remediation:
  action: block
  timing: proactive
  message: >-
    BLOCKED — EU AI Act Article 26 requires deployers of high-risk AI systems
    to use systems per instructions, assign human oversight to competent
    persons, ensure representative input data, monitor operation, retain logs
    for at least 6 months, and cooperate with authorities. Penalties: up to
    EUR 15M or 3% of global revenue.
  suggestion: >-
    Ensure compliance with deployer obligations: use the AI system according to
    instructions for use, assign human oversight to trained and competent
    individuals, validate input data relevance, monitor the system and report
    incidents, retain automatically generated logs for at least six months, and
    inform workers and affected persons of the system's use.
version: 1.0.0
tags:
- eu-ai-act
- article-26
- high-risk
- deployer-obligations
- log-retention
tier: enterprise
