id: EU_AI_ACT_GPAI_TECHNICAL_DOCUMENTATION_001
jurisdiction: EU
effective_date: '2026-08-02'
description: >-
  Requires providers of general-purpose AI models to draw up and keep
  up-to-date technical documentation of the model, including training and
  testing processes and evaluation results, and to make it available to the
  AI Office and national competent authorities on request. Article 53(1)(a) of the EU AI Act mandates comprehensive technical
  documentation for all GPAI models (the documentation must contain, at a
  minimum, the information set out in Annex XI). Note: Article 52 in the
  final adopted text is the separate notification procedure for systemic-risk
  GPAI models, not technical documentation.
detection_scope: all
conditions:
- type: semantic
  prompt: >-
    Determine whether the following text describes deploying, distributing,
    or releasing a general-purpose AI model without the required technical
    documentation, model card, or documentation of training and evaluation
    processes as mandated by Article 53(1)(a) of the EU AI Act.
  model: gpt-4
- type: regex
  value: (deploy|release|distribute|ship|launch)\w*\s+(a\s+|the\s+)?(gpai|general[\-\s]purpose\s+ai|foundation\s+model|large\s+language\s+model|llm)\s+(without|lacking|missing|no)\s+(documentation|model\s+card|technical\s+documentation|technical\s+docs|data\s+sheet)
  flags: i
severity: high
category: consumer_protection
source:
  regulation: EU AI Act
  article: Article 53(1)(a)
  url: https://eur-lex.europa.eu/eli/reg/2024/1689/oj
  last_updated: '2024-07-12'
  citation: >-
    Regulation (EU) 2024/1689, Article 53(1)(a-b): Providers of
    general-purpose AI models shall draw up and keep up-to-date the
    technical documentation of the model, including its training and
    testing process and the results of its evaluation, which shall
    contain, at a minimum, the information set out in Annex XI for the
    purpose of providing it, upon request, to the AI Office and the
    national competent authorities.
remediation:
  action: warn
  timing: proactive
  message: >-
    WARNING — EU AI Act Article 53(1)(a) requires GPAI model providers to
    maintain comprehensive technical documentation including training
    processes, testing methodology, and evaluation results (minimum content
    set out in Annex XI).
    Deploying without documentation may result in penalties of up to
    EUR 15M or 3% of global annual revenue.
  suggestion: >-
    Prepare technical documentation following Annex XI of the EU AI Act
    before deployment. Include model architecture details, training data
    description, evaluation benchmarks, known limitations, and intended
    use cases. Create a model card and keep documentation up to date.
version: 1.0.0
tags:
- eu-ai-act
- gpai
- article-53
- technical-documentation
- model-card
tier: enterprise
