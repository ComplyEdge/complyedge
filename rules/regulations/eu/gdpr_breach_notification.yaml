id: GDPR_BREACH_NOTIFICATION_001
jurisdiction: EU
effective_date: '2018-05-25'
description: >-
  Requires controllers to notify the supervisory authority of a personal data
  breach without undue delay and not later than 72 hours after becoming aware,
  unless the breach is unlikely to result in a risk to rights and freedoms.
  GDPR Article 33.
detection_scope: all
conditions:
- type: semantic
  prompt: >-
    Determine whether the following text describes, requests, or facilitates
    failing to notify the supervisory authority of a personal data breach
    within 72 hours as required by GDPR Article 33. Controllers must notify
    the competent supervisory authority without undue delay and, where
    feasible, not later than 72 hours after becoming aware of a personal data
    breach, unless the breach is unlikely to result in a risk to the rights
    and freedoms of natural persons. The notification must describe the nature
    of the breach, categories and approximate number of affected data subjects,
    likely consequences, and measures taken to address the breach.
  model: gpt-4
- type: regex
  value: >-
    (data\s+breach\s+(?:not\s+)?(?:reported|notified|disclosed)|fail(?:ing|ure)?\s+to\s+(?:notify|report|disclose)\s+(?:a\s+)?(?:data\s+)?breach|breach\s+notification\s+(?:not\s+)?(?:sent|required|made)|delay(?:ing|ed)?\s+breach\s+notification|(?:conceal|hide|cover\s+up)\w*\s+(?:a\s+)?(?:data\s+)?breach|(?:72\s+hours?|three\s+days?)\s+(?:breach|notification)\s+(?:deadline|requirement)\s+(?:not\s+)?met|no\s+(?:breach|incident)\s+(?:notification|reporting)\s+(?:process|procedure|plan)|personal\s+data\s+breach\s+(?:without|lacking)\s+(?:notification|reporting))
  flags: i
severity: critical
category: privacy
source:
  regulation: GDPR
  article: Article 33
  url: https://eur-lex.europa.eu/eli/reg/2016/679/oj
  last_updated: '2016-04-27'
  citation: >-
    Regulation (EU) 2016/679, Article 33(1): In the case of a personal data
    breach, the controller shall without undue delay and, where feasible, not
    later than 72 hours after having become aware of it, notify the personal
    data breach to the supervisory authority competent in accordance with
    Article 55, unless the personal data breach is unlikely to result in a
    risk to the rights and freedoms of natural persons. Where the notification
    to the supervisory authority is not made within 72 hours, it shall be
    accompanied by reasons for the delay.
penalty_information:
  civil_penalties:
    sec_enforcement: Up to EUR 10,000,000 or 2% of worldwide annual turnover
remediation:
  action: block
  timing: reactive
  message: >-
    BLOCKED — GDPR Article 33 requires notification of personal data breaches
    to the supervisory authority within 72 hours. Failure to notify or
    concealing a breach is a serious violation. Penalties: up to EUR 10M or
    2% of global revenue.
  suggestion: >-
    Immediately notify the competent supervisory authority of the personal
    data breach, including: nature of the breach, categories and number of
    affected data subjects, likely consequences, and measures taken or
    proposed to mitigate the breach. If notification exceeds 72 hours,
    provide reasons for the delay.
version: 1.0.0
tags:
- gdpr
- article-33
- breach-notification
- 72-hours
- supervisory-authority
tier: enterprise
