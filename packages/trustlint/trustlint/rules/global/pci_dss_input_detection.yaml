id: PCI_DSS_INPUT_001
jurisdiction: GLOBAL
effective_date: '2004-12-15'
description: Proactively detects payment card information in user inputs to prevent
  PCI DSS violations
detection_scope: user_input
# Layer 1 (deterministic regex) conditions. Multi-signal correlation
# (card number co-occurring with name/address) requires Layer 2 evaluation
# and is intentionally not expressed here.
conditions:
- type: regex
  value: \b4[0-9]{12}(?:[0-9]{3})?\b
- type: regex
  value: \b5[1-5][0-9]{14}\b
- type: regex
  value: \b3[47][0-9]{13}\b
- type: regex
  value: \b6(?:011|5[0-9]{2})[0-9]{12}\b
- type: regex
  value: \b(credit card|debit card|card number|cvv|cvc|expir)\b
  flags: i
- type: regex
  value: (?i)\b(my card|my credit|my debit|card.*\d{4})\b
  flags: i
severity: high
category: financial
source:
  regulation: PCI DSS
  article: Requirement 3.4
  url: https://www.pcisecuritystandards.org/pci_security/
  last_updated: '2022-03-31'
exceptions:
- condition: Masked card references
  description: References to cards with only last 4 digits (e.g., 'card ending in
    1234')
remediation:
  action: block
  timing: proactive
  message: 🏦 Credit card information detected. For your security, we cannot process
    payment card details in this channel.
  suggestion: Use our secure payment portal for any payment-related needs
  alternatives:
  - Refer to your card as 'my Visa ending in XXXX'
  - Use our secure payment processing system
  - Contact customer service through our verified payment channels
  allow_override: false
  require_explicit_consent: false
version: 1.1.0
tags:
- pci_dss
- payment
- financial
- credit_card
- proactive
- security
tier: community
