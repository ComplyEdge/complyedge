id: HIPAA_PHI_INPUT_001
jurisdiction: US
effective_date: '1996-08-21'
description: Proactively detects protected health information in user inputs before
  processing
detection_scope: user_input
# Layer 1 (deterministic regex) conditions. Context-gated PHI keyword
# detection and multi-signal correlation (medical term + age + name) require
# Layer 2 evaluation — bare condition/medication keywords must not fire
# standalone (see exceptions: general health education is out of scope).
# The personal-context regex below plus the self-contextual provider pattern
# are the standalone-safe Layer 1 subset.
conditions:
- type: regex
  value: (?i)\b(my (condition|diagnosis|medication|treatment|symptoms?))\b
  flags: i
- type: regex
  value: (?i)\b(doctor|physician|hospital|clinic|emergency room)\b.*\b(said|told|prescribed|diagnosed)\b
severity: high
category: healthcare
source:
  regulation: HIPAA
  article: 45 CFR § 164.502
  url: https://www.hhs.gov/hipaa/for-professionals/privacy/laws-regulations/index.html
  last_updated: '2013-01-25'
exceptions:
- condition: General health education questions
  description: Questions about general health topics without personal details
- condition: Public health information
  description: Publicly available health information or statistics
remediation:
  action: proactive_warn
  timing: proactive
  message: 🏥 You're sharing health information that may be protected under HIPAA.
    Consider if these details are necessary.
  suggestion: Try asking general health questions without mentioning specific conditions,
    medications, or personal medical details
  alternatives:
  - 'Ask about general symptoms: ''What are common treatments for blood sugar management?'''
  - 'Request educational information: ''How do diabetes medications work?'''
  - 'Seek general guidance: ''What should I discuss with my doctor about...'''
  allow_override: false
  require_explicit_consent: true
version: 1.1.0
tags:
- hipaa
- phi
- health
- proactive
- input_protection
tier: developer
