id: EU_AI_ACT_ART50_GPAI_CONTENT_DISCLOSURE_001
jurisdiction: EU
effective_date: '2026-08-02'
description: >-
  Requires providers of GPAI systems generating synthetic audio, image, video
  or text content to mark the output as artificially generated or manipulated
  in a machine-readable format. Article 50(2) of the EU AI Act. Detects
  AI-generated text delivered to users without any disclosure marker.
detection_scope: all
conditions:
- type: semantic
  prompt: >-
    Determine whether the following text is AI-generated content being
    delivered to an end user WITHOUT any indication, watermark, or
    disclosure that it was generated by an AI system. Article 50(2) of
    the EU AI Act requires GPAI-generated content to be marked as
    artificially generated in a machine-readable format. Respond with
    whether this output is missing the required disclosure.
  model: gpt-4
- type: regex
  value: (here\s+is\s+(your|the)\s+(draft|article|post|content|essay|copy)|i\s+(have\s+)?(written|generated|created|produced|drafted)\s+(this|the\s+following|a)\s+(article|post|content|response|essay|text|draft)|(generated|produced)\s+by\s+ai\s+without\s+(disclosure|marker|watermark)|this\s+(content|text|output)\s+(was|is)\s+(not\s+)?(marked|disclosed|flagged)\s+as\s+ai[- ]?generated)
  flags: i
severity: high
category: consumer_protection
source:
  regulation: EU AI Act
  article: Article 50(2)
  url: https://eur-lex.europa.eu/eli/reg/2024/1689/oj
  last_updated: '2024-07-12'
  citation: >-
    Regulation (EU) 2024/1689, Article 50(2): Providers of AI systems,
    including general purpose AI systems, generating synthetic audio,
    image, video or text content, shall ensure that the outputs of the
    AI system are marked in a machine-readable format and detectable as
    artificially generated or manipulated. Providers shall ensure their
    technical solutions are effective, interoperable, robust and
    reliable as far as this is technically feasible, taking into account
    the specificities and limitations of various types of content, the
    costs of implementation and the generally acknowledged state of the
    art, as may be reflected in relevant technical standards.
remediation:
  action: warn
  timing: proactive
  message: >-
    WARN — EU AI Act Article 50(2) requires GPAI-generated content to be
    marked in a machine-readable format as artificially generated. Add a
    disclosure marker (e.g., C2PA manifest, explicit "AI-generated" label)
    before delivering to end users. Penalties: up to €15M or 3% of global
    revenue.
  suggestion: >-
    Embed a machine-readable AI-generation marker (C2PA, XMP metadata,
    or an explicit disclosure line in the output). For LLM text, prepend
    or append a standard disclosure such as "This content was generated
    by an AI system."
version: 1.0.0
tags:
- eu-ai-act
- article-50
- transparency
- gpai
- ai-disclosure
tier: enterprise
