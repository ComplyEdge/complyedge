id: GDPR_CONSENT_001
jurisdiction: EU
effective_date: '2018-05-25'
description: >-
  Requires explicit consent before processing personal data for marketing
  purposes. Consent must be freely given, specific, informed, and unambiguous.
  The data subject must be able to withdraw consent at any time.
  GDPR Article 6(1)(a) and Article 7.
detection_scope: all
conditions:
- type: semantic
  prompt: >-
    Determine whether the following text describes, requests, or facilitates
    processing personal data for marketing purposes without obtaining explicit
    consent from the data subject as required by GDPR Article 6(1)(a). Consent
    must be freely given, specific, informed, and an unambiguous indication of
    the data subject's wishes. Detect intent to process personal data without
    valid consent — but do NOT flag text that explicitly states data is NOT
    being processed, or that describes compliant data handling practices.
  model: gpt-4
- type: regex
  value: >-
    ((?<!not\s)(?<!don't\s)(?<!dont\s)(?<!never\s)(?<!without\s)(?:process|store|collect|gather|harvest)\w*\s+(?:your\s+|the\s+|their\s+)?personal\s+data\s+(?:without|lacking|before\s+obtaining)\s+(?:consent|permission|authorization)|marketing\s+(?:without|lacking|before)\s+(?:consent|opt[\-\s]in|permission)|personal\s+data\s+(?:for\s+)?marketing\s+(?:without|lacking)\s+consent|no\s+consent\s+(?:required|needed|obtained)\s+(?:for|before)\s+(?:processing|marketing|data)|(?:skip|bypass|ignore)\w*\s+(?:consent|opt[\-\s]in)\s+(?:for|before|requirement)|consent\s+(?:not\s+)?(?:obtained|required|recorded)\s+(?:for|before)\s+(?:processing|marketing))
  flags: i
- type: metadata
  key: purpose
  op: contains
  value: marketing
- type: metadata
  key: consent_recorded
  op: '!='
  value: true
severity: high
category: privacy
source:
  regulation: GDPR
  article: Article 6(1)(a), Article 7
  url: https://eur-lex.europa.eu/eli/reg/2016/679/oj
  last_updated: '2016-04-27'
  citation: >-
    Regulation (EU) 2016/679, Article 6(1)(a): Processing shall be lawful
    only if and to the extent that the data subject has given consent to the
    processing of his or her personal data for one or more specific purposes.
    Article 7(1): Where processing is based on consent, the controller shall
    be able to demonstrate that the data subject has consented to processing
    of his or her personal data. Article 7(3): The data subject shall have
    the right to withdraw his or her consent at any time.
penalty_information:
  civil_penalties:
    sec_enforcement: Up to EUR 20,000,000 or 4% of worldwide annual turnover
remediation:
  action: block
  timing: proactive
  message: >-
    BLOCKED — GDPR Article 6(1)(a) requires explicit consent before processing
    personal data for marketing purposes. Consent must be freely given,
    specific, informed, and unambiguous. Penalties: up to EUR 20M or 4% of
    global revenue.
  suggestion: >-
    Obtain and record explicit consent from the data subject before processing
    personal data for marketing. Consent must be freely given, specific,
    informed, and an unambiguous indication of wishes. Ensure the data subject
    can withdraw consent at any time as easily as it was given.
version: 2.0.0
tags:
- gdpr
- article-6
- article-7
- consent
- personal-data
- marketing
tier: enterprise
