  art_55_systemic_risk:
    score: 3
    rationale: >-
      Google DeepMind operates the Frontier Safety Framework with
      defined capability evaluations and mitigation protocols. AGI
      Safety Council governance is documented. Public partnerships with
      UK AI Security Institute for pre-deployment evaluations are
      announced. Per-frontier-release FSF reports document red-teaming
      and capability assessment outcomes. Cybersecurity practices for
      model weights are addressed in FSF protocols. This is comparable
      to Anthropic's RSP in scope.
    evidence:
    - url: https://deepmind.google/about/responsibility-safety/
      verified_date: '2026-07-10'
      doc_type: blog
      summary: >-
        Frontier Safety Framework, AGI Safety Council, and
        partnerships with UK AI Security Institute documented as
        Google DeepMind's systemic-risk governance.
      sha256: f5a5a8b2c34f449e41cf7603e23238101463af248467d886e2f17225a76a22ff
