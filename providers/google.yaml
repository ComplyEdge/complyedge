      sha256: 0b093ee5fc80e30fa5b46e6aa9a853c6dd3f308656e9c9a346724e108e620e46
  art_53_1_c_copyright_transparency:
    score: 2
    rationale: >-
      Google operates Google-Extended, a dedicated robots.txt user-agent
      token (separate from Googlebot) allowing publishers to opt content
      out of training Gemini and Vertex AI generative APIs. This provides
      a machine-readable, scalable rights-reservation mechanism satisfying
      the spirit of Art 53(1)(c). No published copyright policy describes
      how TDM reservations under Article 4(3) of the DSM Directive are
      systematically identified and respected during crawling beyond
      robots.txt — so score is 2 not 3.
    evidence:
    - url: https://blog.google/technology/ai/an-update-on-web-publisher-controls/
      verified_date: '2026-05-09'
      doc_type: blog
      summary: >-
        Official announcement (Sep 28, 2023) of Google-Extended as a
        robots.txt control for web publishers to opt content out of
        Gemini/Bard and Vertex AI generative training, separate from
        Googlebot search crawling.
      sha256: 3ec0c7fcaf2af2a12d126837809b7cfdb26fa8be21879cc335d05ab6afbe9305
    - url: https://developers.google.com/search/docs/crawling-indexing/overview-google-crawlers
      verified_date: '2026-05-09'
      doc_type: api_doc
      summary: >-
        Official Google crawler documentation enumerating user-agents
        including Google-Extended, with verification procedures.

      sha256: cbb19f40b42bc2acde7611a7751a6d5acfd449ae11be945f7aa3f4e1c79e7591
  art_53_1_d_e_downstream_obligations:
    score: 3
    rationale: >-
      Comprehensive developer documentation across ai.google.dev for
      Gemini API, Vertex AI documentation for enterprise deployments,
      published Generative AI Prohibited Use Policy enumerating
      restricted downstream applications, system instructions support,
      and prompt-engineering guides. Capabilities, limitations, and
      intended-use guidance are well-documented per model variant.
      Training-data summary per the AI Office template is not yet
      published (template pending across all providers).
    evidence:
    - url: https://cloud.google.com/vertex-ai/generative-ai/docs/learn/models
      verified_date: '2026-05-09'
      doc_type: api_doc
      summary: >-
