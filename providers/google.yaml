obligations:

  art_50_2_content_disclosure:
    score: 2
    rationale: >-
      Google operates SynthID, a machine-readable watermarking system
      embedded in AI-generated images, audio, video, and (per DeepMind
      docs) text from Google's generative consumer products. SynthID
      Detector portal allows third-party verification. This satisfies
      Art 50(2) machine-readable marking requirement for media outputs.
      Score is 2 (not 3) because SynthID coverage on text outputs from
      the Gemini API is not as broadly documented as media coverage,
      and detector access is currently waitlisted rather than openly
      programmatic.
    evidence:
    - url: https://deepmind.google/science/synthid/
      verified_date: '2026-05-09'
      doc_type: blog
      summary: >-
        Official SynthID page describing imperceptible watermarks
        embedded in AI-generated images, audio, text, and video
        across Google's generative AI consumer products. Detector
        portal verifies provenance.

      sha256: f0b7df11001f7ddbd6a1f02fe1519be94dec17b9f9aea2386944d64adb3b8421
  art_51_model_classification:
    score: 2
    rationale: >-
      Google publishes the Frontier Safety Framework (FSF), now at
      version 2.0, which defines Critical Capability Levels (CCLs) as
      the basis for systemic-risk classification. The February 2025
      FSF 2.0 announcement explicitly states the Framework has been
      "implemented in our safety and governance processes for evaluating
      frontier models such as Gemini 2.0," demonstrating per-model
      application of the classification regime. Per-model FSF reports
      (e.g. Gemini 3 Pro) document the resulting classification outcomes.
      Score is 2 (not 3) because no public artefact citing Article 51(1)(a)
      compute thresholds or formal AI Office notification has been located
      on official Google channels — the FSF substitutes Google's own CCL
      taxonomy for the Act's compute-based threshold.
    evidence:
    - url: https://deepmind.google/discover/blog/updating-the-frontier-safety-framework/
      verified_date: '2026-05-09'
      doc_type: blog
      summary: >-
        February 2025 FSF 2.0 announcement defining Critical
        Capability Levels (CCLs) and stating the Framework has been
        implemented for evaluating Gemini 2.0 — demonstrating per-model
        systemic-risk classification.
      sha256: 2c4da45f96f2eee1c6ade5982c07ed25e91ee80dad4820d64c6402a27e14c880
    - url: https://storage.googleapis.com/deepmind-media/DeepMind.com/Blog/updating-the-frontier-safety-framework/Frontier%20Safety%20Framework%202.0.pdf
      verified_date: '2026-05-09'
      doc_type: other
      summary: >-
        Frontier Safety Framework 2.0 technical document (PDF)
        published by Google DeepMind defining CCLs across misuse and
        deceptive-alignment risk domains with security and deployment
        mitigation tiers.
      sha256: 14a48e4ef052fba75b651ea23845c2e9557f5c638e2767656decc6410861aae3
    - url: https://deepmind.google/about/responsibility-safety/
      verified_date: '2026-05-09'
      doc_type: blog
      summary: >-
        Responsibility & Safety overview confirming FSF as Google's
        systemic-risk governance instrument and AGI Safety Council
        structure.

      sha256: 38c2fb6d3f1eaf9eb87cca8e86e54a70a5fe698b47f862fb434abe6b42becafb
  art_52_53_1_a_b_technical_documentation:
    score: 3
    rationale: >-
      Google publishes detailed technical reports for each major Gemini
      generation (Gemini 1.0, 1.5, 2.5, 3) covering training methodology,
      capability evaluations across published benchmarks, and known
      limitations. Per-model evaluation methodology pages document
      specific harnesses and scoring procedures. Frontier Safety
      Framework reports accompany each frontier release. Documentation
      depth and cadence meet Annex XI expectations.
    evidence:
    - url: https://deepmind.google/technologies/gemini/
      verified_date: '2026-05-09'
      doc_type: model_card
      summary: >-
        Gemini model family overview with linked technical reports
        and per-model FSF safety reports.
      sha256: caad4e732ad4413bd0b049fcbeb20d948b355bdbc2ac634f18d002de34e5e163
    - url: https://deepmind.google/models/evals-methodology/gemini-3-1-pro/
      verified_date: '2026-05-09'
      doc_type: model_card
      summary: >-
        Per-model evaluation methodology page for Gemini 3.1 Pro
        documenting specific benchmark harnesses (Humanity's Last
        Exam, ARC-AGI-2, GPQA, SWE-Bench, MMMU-Pro, etc.) and scoring
        procedures.
      sha256: 5a0a36e6d25d587f5325fe70d185593a9270a46b340d9d97f8cf569360ab8b70
    - url: https://deepmind.google/models/fsf-reports/gemini-3-pro/
      verified_date: '2026-05-09'
      doc_type: blog
      summary: >-
        Frontier Safety Framework report for Gemini 3 Pro covering
