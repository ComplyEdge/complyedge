  art_51_model_classification:
    score: 2
    rationale: >-
      Anthropic's Responsible Scaling Policy explicitly identifies
      Claude 3 Opus and Claude 3.5 Sonnet as ASL-2 systems and discusses
      systemic risk thresholds. Public AI Office notification has not
      been confirmed, but self-classification is documented at policy level.
    evidence:
    - url: https://www.anthropic.com/news/anthropics-responsible-scaling-policy
      verified_date: '2026-05-09'
      doc_type: blog
      summary: >-
        Responsible Scaling Policy v1 introducing AI Safety Levels
        (ASL) framework with capability evaluation thresholds.
