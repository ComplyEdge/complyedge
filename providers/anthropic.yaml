obligations:

  art_50_2_content_disclosure:
    score: 0
    rationale: >-
      Claude is text-only at the time of evaluation; no machine-readable
      AI-generated content marking is implemented in the API. Anthropic
      has stated the obligation is acknowledged but no implementation
      has shipped.
    evidence:
    - url: https://docs.anthropic.com/en/api/messages
      verified_date: '2026-05-09'
      doc_type: api_doc
      summary: >-
        Messages API reference contains no machine-readable disclosure
        field; output is plain text.

