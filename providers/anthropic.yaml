  art_55_systemic_risk:
    score: 3
    rationale: >-
      Responsible Scaling Policy mandates capability evaluations before
      deployment. Anthropic publishes red-teaming methodology, capability
      evaluation results, and operates an external safety evaluation
      programme with UK AI Safety Institute and US AISI. Cybersecurity
      controls for model weights are described at ASL-3 standard.
    evidence:
    - url: https://www.anthropic.com/responsible-scaling-policy
      verified_date: '2026-05-09'
      doc_type: transparency_report
      summary: >-
        Responsible Scaling Policy hub page (last updated Apr 29 2026).
        Lists current v3.2 RSP plus all prior versions, RSP Noncompliance
        Reporting and Anti-Retaliation Policy, Frontier Safety Roadmap, and
        Risk Reports for deployed models. ASL-3 deployment and security
        safeguards documented including red-teaming, incident response, and
        weight-access controls.
      sha256: bc763bb19f38556c06a22af9aeec8a5c45fe3a069a25b7aee52d47e6050f902d
    - url: https://www.anthropic.com/news/announcing-our-updated-responsible-scaling-policy
      verified_date: '2026-05-09'
      doc_type: blog
      summary: >-
        Announcement of updated RSP — capability thresholds, ASL-3 security
        and deployment standards, external evaluation commitments with UK
        AISI and US AISI.
