  art_55_systemic_risk:
    score: 0
    rationale: >-
      Stability AI has not designated any released model as systemic-
      risk under EU AI Act Article 51. The model portfolio (SD 3.5
      Large MMDiT image-generation, Stable Audio 2.5, Stable Video,
      Stable 3D variants) operates at compute scales substantially
      below the Article 51(1)(a) 10^25 FLOPs threshold. No published
      frontier-AI safety framework comparable to closed-API frontier
      providers; Integrity Transparency Report and integrity
      evaluations focus on harm categories appropriate for image/
      audio/video generation (red-teaming, content filtering)
      rather than catastrophic-risk categories. With
      `systemic_risk_threshold: false`, this obligation is excluded
      from scoring as not applicable.
    evidence: []
