        30, 2025) for co-developing professional AI music creation
        tools "powered by responsibly trained generative AI",
        signalling licensed training-data partnerships for the
        Stable Audio model family.
      sha256: 6e3093961363edbe36f2b2d2c667e0557362a764fdc8a56f5ffa44a27d61f410
      wayback_url: https://web.archive.org/web/20260509195906/https://stability.ai/news-updates/universal-music-group-and-stability-ai-announce-strategic-alliance
