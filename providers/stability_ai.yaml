provider_id: stability_ai
provider_name: Stability AI
model_class: open_weights
systemic_risk_threshold: false
last_updated: '2026-05-09'
verification_status: needs_review

obligations:

  art_50_2_content_disclosure:
    score: 1
    rationale: >-
      Stability's Acceptable Use Policy (effective 2025-07-31)
      explicitly prohibits "misleading end users about the nature of
      outputs from Stability AI Technology (such as pretending it was
      made by a human) or failing to appropriately disclose when
      someone is interacting with AI where it is not apparent" — a
      deployer-side AI-disclosure obligation flowed through the AUP
      to all downstream users of Stable Diffusion, Stable Video,
      Stable Audio and Stable 3D models. Stability's Annual Integrity
      Transparency Report (Sept 2025) and Tech Coalition membership
      (Feb 2026) signal commitment to provenance-related responsible
      AI. However, no published model card for SD 3.5 Large, Stable
      Audio 2.5, or Stable Video documents a Stability-implemented
      C2PA Content Credentials manifest, invisible-watermark, or
      machine-readable provenance signal applied at inference time
      across all model surfaces. Score is 1: strong deployer-flow-down
      AUP clause + transparency culture, but no provider-side
      machine-readable marking documented for synthetic image / audio
      / video output.
    evidence:
    - url: https://stability.ai/use-policy
      verified_date: '2026-05-09'
      doc_type: terms_of_service
      summary: >-
        Acceptable Use Policy (effective 2025-07-31) Section "We
        Prohibit Deceiving or Misleading Others" requiring deployers
        to disclose AI-generated nature of outputs and prohibiting
        impersonation, misinformation, and election-disrupting
        content.
      sha256: 36d65e871f2529c47301e6497c2bbcbb303f49781b51ee63e76d3cb9e3b7769b
      wayback_url: https://web.archive.org/web/20260509195545/https://stability.ai/use-policy
      archived_date: '2026-05-09'
    - url: https://stability.ai/news-updates/stability-ais-annual-integrity-transparency-report
      verified_date: '2026-05-09'
      doc_type: transparency_report
      summary: >-
        Annual Integrity Transparency Report (Sept 17, 2025)
        documenting Stability AI's responsible-AI deployment
        practices, safety measures, and integrity evaluations across
        image, video, audio and 3D model surfaces.

      sha256: baa75d2c5efb64ccddac2764ff0bfda2a52c8f5add8281170cbec41d0bb4a4b3
      wayback_url: https://web.archive.org/web/20260509195648/https://stability.ai/news-updates/stability-ais-annual-integrity-transparency-report
      archived_date: '2026-05-09'
  art_51_model_classification:
    score: 0
    rationale: >-
      No public Stability AI artefact classifies any released model
      (SD 3.5 family, Stable Video, Stable Audio 2.5, Stable Audio
      Open, Stable 3D, SPAR3D, SV4D 2.0) under the EU AI Act's
      "General Purpose AI Model" or "GPAI Model with Systemic Risk"
      taxonomy. SD 3.5 Large is a text-to-image MMDiT model trained
      with substantially less compute than the Article 51(1)(a) 10^25
      FLOPs threshold. Stability is UK-domiciled (Stability AI Ltd).
      No GPAI self-classification statement is published on
      stability.ai, the Trust Center, or model cards. Score is 0.
    evidence: []

  art_52_53_1_a_b_technical_documentation:
    score: 2
    rationale: >-
      Stability publishes technical documentation across multiple
      surfaces: (a) Hugging Face model cards for each major model
      (Stable Diffusion 3.5 Large, Stable Audio Open Small, etc.)
      with model type, architecture (MMDiT — Multimodal Diffusion
      Transformer), text encoders enumerated (OpenCLIP-ViT/G,
      CLIP-ViT/L, T5-xxl with context lengths), implementation
      details (QK normalization), license terms, intended uses, and
      out-of-scope uses; (b) original research paper on MMDiT
      architecture (arxiv 2403.03206 — "Scaling Rectified Flow
      Transformers for High-Resolution Image Synthesis"); (c) launch
      blogs (introducing-stable-diffusion-3-5, sd3.5 NIM, SV4D 2.0)
      with comparative benchmark and integration details; (d) GitHub
      reference implementation at Stability-AI/sd3.5. Score is 2:
      strong cards + research papers but no FLOPs disclosure, no
      Annex IX EU AI Office template summary, no structured Annex XI
      enumeration of computational resources or energy consumption.
    evidence:
    - url: https://huggingface.co/stabilityai/stable-diffusion-3.5-large
      verified_date: '2026-05-09'
      doc_type: model_card
      summary: >-
        Hugging Face model card for Stable Diffusion 3.5 Large
        documenting MMDiT architecture, three pretrained text
        encoders (OpenCLIP-ViT/G, CLIP-ViT/L, T5-xxl), QK
        normalization implementation, training data summary
        ("synthetic data and filtered publicly available data"),
        intended uses, out-of-scope uses, integrity evaluation, and
        identified risks/mitigations.
      sha256: 98a91a22e233435f1be2959020ecc291f33f6027f5da3de2a63871db71f02ce5
      wayback_url: https://web.archive.org/web/20260509195723/https://huggingface.co/stabilityai/stable-diffusion-3.5-large
      archived_date: '2026-05-09'
    - url: https://stability.ai/news-updates/introducing-stable-diffusion-3-5
      verified_date: '2026-05-09'
      doc_type: blog
      summary: >-
        Stable Diffusion 3.5 product announcement (October 22, 2024)
        introducing SD 3.5 Large, SD 3.5 Large Turbo, and SD 3.5
        Medium model variants with comparative quality and prompt-
        adherence benchmarks.

      sha256: efc811a9060abe08789fab5ece0e720da96a2e9f6d1fecaada35f80c6969a11d
      wayback_url: https://web.archive.org/web/20260509195837/https://stability.ai/news-updates/introducing-stable-diffusion-3-5
      archived_date: '2026-05-09'
  art_53_1_c_copyright_transparency:
    score: 1
    rationale: >-
      The SD 3.5 Large model card explicitly acknowledges training
      data composition at a high level: "This model was trained on a
      wide variety of data, including synthetic data and filtered
      publicly available data." Stability has additionally publicised
      strategic music-training partnerships with Universal Music
      Group (Oct 2025) and Warner Music Group (Nov 2025) for
      "responsibly trained generative audio", and joined the Tech
      Coalition (Feb 2026) to combat CSAM in training pipelines.
      However, no structured training-data inventory in EU AI Office
      template format is published, no per-model dataset
      provenance/source enumeration, no rightsholder opt-out
      mechanism is documented (no dedicated AI-training crawler
      identifier with robots.txt opt-out), and no public ContentAuth /
      Spawning.ai integration is documented. Score is 1: explicit
      acknowledgement of training data + responsible-licensing
      partnerships, but below structured Annex IX summary level.
    evidence:
    - url: https://stability.ai/news-updates/universal-music-group-and-stability-ai-announce-strategic-alliance
      verified_date: '2026-05-09'
      doc_type: blog
      summary: >-
