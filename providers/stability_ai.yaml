  art_53_1_d_e_downstream_obligations:
    score: 3
    rationale: >-
      Stability's Acceptable Use Policy (effective 2025-07-31) is the
      most thoroughly EU-AI-Act-aligned AUP among the 8 providers
      benchmarked. It explicitly enumerates Article 5 prohibited
      practices verbatim: subliminal/manipulative/deceptive techniques
      causing harm; exploitation of vulnerabilities (age, disability,
      socio-economic); social scoring leading to detrimental
      treatment; predictive policing based solely on profiling;
      creation/expansion of facial recognition databases without
      consent; emotion inference in workplace/education (with medical/
      safety carve-out); biometric categorisation to infer protected
      attributes (race, political opinion, trade-union membership,
      religion, sex life, sexual orientation); real-time biometric
      identification in public for law enforcement. Plus dedicated
      sections prohibiting CSAM/grooming/trafficking (with reporting
      to authorities), NCII, deception/AI-disclosure violations,
      election-disruption content, weapons development, safeguard
      circumvention, and self-harm content. Backed by joining the
      Tech Coalition (Feb 2026) for CSAM combat, SOC 2 Type II + SOC
      3 compliance (Aug 2025), Annual Integrity Transparency Report
      (Sept 2025), Trust Center at trust.stability.ai, and tiered
      Community vs Enterprise licensing with downstream-developer
      obligations. Score is 3: industry-leading AUP that maps
      directly to EU AI Act Article 5, supported by enterprise-grade
      compliance certifications and published transparency reporting.
    evidence:
    - url: https://stability.ai/use-policy
      verified_date: '2026-05-09'
      doc_type: terms_of_service
      summary: >-
        Acceptable Use Policy (effective 2025-07-31) explicitly
        enumerating EU AI Act Article 5 prohibited practices
        including subliminal/manipulative techniques, vulnerability
        exploitation, social scoring, predictive policing,
        untargeted facial-recognition scraping, workplace/education
        emotion inference, biometric categorisation for protected
        attributes, real-time public-space biometric identification,
        plus CSAM/NCII/election-disruption/weapons/self-harm
        prohibitions and deployer AI-disclosure obligations.
      sha256: 36d65e871f2529c47301e6497c2bbcbb303f49781b51ee63e76d3cb9e3b7769b
      wayback_url: https://web.archive.org/web/20260509195545/https://stability.ai/use-policy
      archived_date: '2026-05-09'
    - url: https://stability.ai/license
      verified_date: '2026-05-09'
      doc_type: terms_of_service
      summary: >-
        Stability AI License page documenting tiered licensing
        structure: free Community License for users with less than
        $1M annual revenue (covering SD 3.5 Suite, SDXL Turbo,
        Stable Audio Open, Stable Fast 3D, etc.) and Enterprise
        License for higher-revenue commercial deployers, with
        downstream-developer obligations enforced via revocable
        license terms.
      sha256: 47c5a7c29b69f480a3556bdab11c5798f56edd8cbe421431405cd4d28e5d2599
      wayback_url: https://web.archive.org/web/20260509200110/https://stability.ai/license
      archived_date: '2026-05-09'
    - url: https://stability.ai/news-updates/stability-ai-joins-the-tech-coalition
      verified_date: '2026-05-09'
      doc_type: blog
      summary: >-
        Tech Coalition membership announcement (Feb 11, 2026)
        confirming Stability AI's participation in the global
        alliance combating online child sexual exploitation and
        abuse (CSAM) — operationalising the AUP CSAM prohibition
        through industry collaboration.
      sha256: 78d3c9e7d95e5de02e6c8ac4fc910c4961b9bb67856d0252e78f8b700ac38982
      wayback_url: https://web.archive.org/web/20260509200137/https://stability.ai/news-updates/stability-ai-joins-the-tech-coalition
      archived_date: '2026-05-09'
    - url: https://stability.ai/news-updates/stability-ai-achieves-soc-2-type-ii-and-soc-3-compliance
      verified_date: '2026-05-09'
      doc_type: blog
      summary: >-
        SOC 2 Type II and SOC 3 compliance attestation announcement
