      sha256: 81bfe63fc0764907007c9b4b84541a9fe8a43970d34c9a4cbbff8d0ad80d8534
      wayback_url: https://web.archive.org/web/20260509200202/https://stability.ai/news-updates/stability-ai-achieves-soc-2-type-ii-and-soc-3-compliance
