  art_53_1_c_copyright_transparency:
    score: 1
    rationale: >-
      Mistral's Privacy Policy (effective April 7, 2026) discloses
      training-data sources at category level: "publicly available
      sources on the internet", "non-public third-party databases",
      "user data subject to opt-out", "internally generated data",
      "curated datasets", and "synthetic data". The policy commits to
      good-practice PII filtering and offers users an opt-out from
      Input/Output use in training via account controls, with the
      Memory feature explicitly opt-out. However, no Annex IX-style
      structured training-data summary in the EU AI Office template
      format has been published, and no dedicated AI-training crawler
      identifier (Google-Extended / Meta-ExternalAgent equivalent)
      with documented robots.txt opt-out is documented on official
      Mistral surfaces. Score is 1: category disclosure exists but
      opt-out mechanisms are limited to direct-user data, not third-
      party rightsholders' web content.
    evidence:
    - url: https://legal.mistral.ai/terms/privacy-policy
      verified_date: '2026-07-10'
      doc_type: terms_of_service
      summary: >-
        Privacy Policy section 9 (US Users) listing training-data
        sources (publicly available datasets, non-public third-party
        databases, user products data subject to applicable terms,
        internally generated data, curated datasets, synthetic data)
        and section 8 documenting user opt-out from Input/Output use
        for model training via account controls.

      sha256: 4a71a328279928213bd3eb3a565613067114b9d54ae2795e941eabd8f5e530ea
      wayback_url: https://web.archive.org/web/20260509201014/https://legal.mistral.ai/terms/privacy-policy
      archived_date: '2026-05-09'
  art_53_1_d_e_downstream_obligations:
    score: 3
    rationale: >-
      Mistral provides comprehensive downstream-deployer documentation:
      Usage Policy (effective March 24, 2026) enumerating prohibited
      content across illegal activity, CSAM (zero-tolerance), NCII,
      hate/discrimination, violence, self-harm, fraud, misinformation,
      privacy violations, professional advice, and security violations;
      License Notice covering open-weights and commercial licensing;
      Mistral Research License (MRL) and Apache 2.0 distribution for
      open models; production-grade Moderation API and Custom Guardrails
      with agent-level configuration available to all deployers;
      tiered terms of service distinguishing EU consumer, ROW consumer,
      and commercial customer with separate Data Processing Addendum.
    evidence:
    - url: https://legal.mistral.ai/terms/usage-policy
      verified_date: '2026-07-10'
      doc_type: terms_of_service
      summary: >-
        Usage Policy (effective March 24, 2026) enumerating prohibited
        downstream content categories (illegal activity, CSAM, NCII,
        hate, violence, self-harm, fraud, misinformation, privacy
        violations, unauthorised professional advice, security
        violations) with enforcement and reporting procedures.
      sha256: 7fd58dba4f30dba82c8ec7541176912403807a0004ecf5a45915951d5c1e9881
      wayback_url: https://web.archive.org/web/20260509201206/https://legal.mistral.ai/terms/usage-policy
      archived_date: '2026-05-09'
    - url: https://legal.mistral.ai/terms
      verified_date: '2026-07-10'
      doc_type: terms_of_service
      summary: >-
        Legal Center index documenting tiered terms (EU consumer,
        ROW consumer, commercial customer, partner) plus Data
        Processing Addendum, License Notice, and Privacy Policy
        governing downstream deployment.
      sha256: b88967c70730aadde7653c4d6e958e8148f46b3c62a4cd8e19ac5ea3d7277c39
      wayback_url: https://web.archive.org/web/20260509201457/https://legal.mistral.ai/terms
      archived_date: '2026-05-09'
    - url: https://docs.mistral.ai/capabilities/guardrailing/
      verified_date: '2026-07-10'
      doc_type: api_doc
      summary: >-
        Moderation & Custom Guardrails documentation providing
        deployers with production-grade safety tooling, agent-level
        guardrail configuration, and customisable category thresholds.

      sha256: 9abf48bb513e4dc823b6fb840ebb691fd5fbc050e13c55aa25f99417e8bb3664
      wayback_url: https://web.archive.org/web/20260509200250/https://docs.mistral.ai/studio-api/conversations/moderation
      archived_date: '2026-05-09'
  art_55_systemic_risk:
    score: 0
    rationale: >-
      Mistral has self-assessed (via the AI Compliance Hub's per-model
      pages classifying all models as standard "General Purpose AI
      Model" without systemic-risk designation) that none of its models
      currently meet the Article 55 systemic-risk threshold. Largest
      model (Mistral Large 3) reports 41B active / 675B total
      parameters. No published frontier-AI safety framework with
      catastrophic-risk thresholds (Cybersecurity / CBRN / Loss of
      Control) comparable to Google's Frontier Safety Framework, Meta's
      Advanced AI Scaling Framework, or Anthropic's Responsible Scaling
      Policy is evidenced on official Mistral surfaces. Score 0
      reflects absence of systemic-risk infrastructure; if Mistral's
      self-classification as non-systemic is accepted as accurate, this
      obligation does not strictly apply (and would be excluded from
      the maximum score).
    evidence: []
