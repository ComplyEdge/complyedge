        capabilities, pricing, and feature matrix.
      sha256: fdfada4e9e7949d697fedbdc57fd3d21bbc77d9a1d6bdcd0b97f4864f372c19d
      wayback_url: https://web.archive.org/web/20260508021011/https://docs.mistral.ai/models/model-cards/mistral-large-3-25-12
