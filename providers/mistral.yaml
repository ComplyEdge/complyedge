provider_id: mistral
provider_name: Mistral AI
model_class: open_weights
systemic_risk_threshold: false
last_updated: '2026-07-10'
verification_status: needs_review

obligations:

  art_50_2_content_disclosure:
    score: 1
    rationale: >-
      Mistral operates a dedicated Moderation API (mistral-moderation-2603)
      and Custom Guardrails system covering 10+ policy categories
      including jailbreaking detection. Le Chat (the consumer product)
      offers image generation via partner integrations but no
      Mistral-published evidence of model-layer machine-readable AI
      output marking (no C2PA membership, no SynthID equivalent, no
      cryptographic watermark on text generations). Score is 1: input
      moderation infrastructure exists but Article 50(2) requires
      machine-readable marking of AI outputs themselves, which is not
      evidenced for Mistral's text or multimodal outputs.
    evidence:
    - url: https://docs.mistral.ai/capabilities/guardrailing/
      verified_date: '2026-07-10'
      doc_type: api_doc
      summary: >-
        Moderation & Guardrailing documentation describing the
        mistral-moderation-2603 API across 10 policy categories
        (sexual, hate, violence, dangerous, criminal, self-harm,
        health, financial, law, PII, jailbreaking) and the Custom
        Guardrails system for inline request-level moderation.

      sha256: 9abf48bb513e4dc823b6fb840ebb691fd5fbc050e13c55aa25f99417e8bb3664
      wayback_url: https://web.archive.org/web/20260509200250/https://docs.mistral.ai/studio-api/conversations/moderation
      archived_date: '2026-05-09'
  art_51_model_classification:
    score: 2
    rationale: >-
      Mistral operates a formal AI Compliance Hub at
      legal.mistral.ai/ai-governance with per-model legal pages that
      explicitly classify each of 28+ models as a "General Purpose AI
      Model" using EU AI Act terminology, with documented release
      dates, model lifecycle status (Active / Update / Version), and
      designation between Base Model and Model Version per Article 51
      taxonomy. As a French EU-domiciled provider, Mistral has the
      strongest jurisdictional alignment with the AI Act. Score is 2
      (not 3) because no public artefact designates any Mistral model
      as meeting the Article 51(1)(a) compute threshold (10^25 FLOPs)
      or carrying the systemic-risk designation, and the provider has
      self-assessed all models as non-systemic (which is plausible
      given Mistral Large 3 reports 41B active / 675B total
      parameters).
    evidence:
    - url: https://legal.mistral.ai/ai-governance/models
      verified_date: '2026-07-10'
      doc_type: api_doc
      summary: >-
        AI Compliance Hub model index listing 28+ Mistral models
        (Mistral Large 1-3, Medium 1-3, Small 1-4, Ministral, Mixtral,
        Codestral, Devstral, Pixtral, Voxtral, Magistral, Mathstral,
        OCR, Moderation, Embed) each with dedicated AI-governance
        documentation page using EU AI Act "General Purpose AI Model"
        terminology.
      sha256: 479cb583f613ca36a3fd88053f791258748648d01fd9db93d0d9b898ace7af01
      wayback_url: https://web.archive.org/web/20260509200420/https://legal.mistral.ai/ai-governance/models
      archived_date: '2026-05-09'
    - url: https://legal.mistral.ai/ai-governance/models/mistral-large-3
      verified_date: '2026-07-10'
      doc_type: api_doc
      summary: >-
        Mistral Large 3.0 governance page classifying both Base Model
        and Instruct Model Version as "General Purpose AI Model" with
        release date (December 2, 2025) and Active lifecycle status,
        plus downloadable technical documentation bundle.

      sha256: 63022c4ca694986d6669804ac6da18c2cc7649309e558fd01dd4b32cdefa69cd
      wayback_url: https://web.archive.org/web/20260509200444/https://legal.mistral.ai/ai-governance/models/mistral-large-3
      archived_date: '2026-05-09'
  art_52_53_1_a_b_technical_documentation:
    score: 3
    rationale: >-
      Mistral publishes per-model technical documentation across two
      official surfaces: (a) docs.mistral.ai model cards for every
      active model with architecture (e.g. Mistral Large 3 = 41B active
      / 675B total Mixture-of-Experts), context windows, modalities,
      pricing, capability features, and version YY.MM tags; (b)
      legal.mistral.ai/ai-governance/models per-model legal pages with
      downloadable technical-documentation ZIP bundles (Annex XI / XII
      style) cited explicitly per model release. Original announcement
      blog posts (e.g. "Large Enough" for Mistral Large 2) provide
      detailed benchmarks across MMLU, MT-Bench, multilingual MMLU,
      code, math, and tool-use evaluations. Documentation depth
      compares favourably to Anthropic and Google.
    evidence:
