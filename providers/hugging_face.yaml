provider_id: hugging_face
provider_name: Hugging Face (first-party models — SmolLM3 / SmolLM family)
model_class: open_weights
systemic_risk_threshold: false
last_updated: '2026-05-09'
verification_status: needs_review
_scoring_note: >-
  Hugging Face Inc. operates a model hub (hosting third-party models) AND
  publishes first-party open-weights models under the HuggingFaceTB and
  HuggingFaceM4 orgs (SmolLM3, SmolLM2, IDEFICS, Zephyr). This benchmark
  scores HF as a GPAI provider for its first-party releases (SmolLM3 is
  the flagship reference). Platform-level policies (Content Policy, ToS,
  model-card framework) are also cited where they govern HF's own
  publishing practices. Hub-hosted third-party models are out of scope
  and would be scored under their own provider IDs.
obligations:
  art_50_2_content_disclosure:
    score: 1
    rationale: >-
      SmolLM3 model card includes a Limitations section warning that
      generated content may not always be factually accurate, logically
      consistent, or free from biases, and that models should be used as
      assistive tools rather than definitive sources. Generic AI-output
      disclaimer present but no machine-readable marking (watermark /
      C2PA) of generated content. Score 1 = disclosure present but not
      technical/machine-readable.
    evidence:
    - url: https://huggingface.co/HuggingFaceTB/SmolLM3-3B
      verified_date: '2026-05-09'
      doc_type: model_card
      summary: >-
        SmolLM3-3B model card Limitations section: "the generated
        content may not always be factually accurate, logically
        consistent, or free from biases present in the training
        data... should be used as assistive tools rather than
        definitive sources of information."
      sha256: 29bb0263d87bb1145dc827cd4e9c8d0722e60a1791593a550c0c7116cca15bd7
  art_51_model_classification:
    score: 0
    rationale: >-
      SmolLM3 is a 3-billion-parameter model trained on 11.2T tokens
      (~2e23 FLOPs training compute by standard estimate), well below
      the EU AI Act Article 51 systemic-risk threshold of 1e25 FLOPs.
      No HF first-party model approaches systemic-risk classification.
      No public statement on Art 51 status because the threshold is not
      engaged. systemic_risk_threshold = false.
    evidence:
    - url: https://huggingface.co/HuggingFaceTB/SmolLM3-3B
      verified_date: '2026-05-09'
      doc_type: model_card
      summary: >-
        Model card confirms 3B parameters, 11.2T pretraining tokens,
        384 H100 GPUs × 24 days — well below 1e25 FLOPs Art 51
        threshold.
      sha256: 044099610e17329e6e2a23146a61357d5acd2156bf95baf82945ce20396cd2f6
  art_52_53_1_a_b_technical_documentation:
    score: 3
    rationale: >-
      Exemplary technical documentation. SmolLM3 model card details
      architecture (transformer decoder, GQA, NoPE, intra-document
      masking), 3-stage pretraining mixture with exact data weights,
      mid-training context extension, SFT, APO alignment, model
      merging via MergeKit, full hyperparameters (global batch 2.36M
      tokens, lr 2e-4, AdamW betas, WSD scheduler), hardware (384
      H100s × 24 days), software stack (nanotron, datatrove,
      lighteval, TRL), and intermediate checkpoints publicly released.
      Companion engineering blueprint blog post supplements the model
      card. HF also operates a platform-wide model-card framework that
      standardizes technical disclosure across the Hub. Score 3 =
      comprehensive regulator-grade technical documentation.
    evidence:
    - url: https://huggingface.co/HuggingFaceTB/SmolLM3-3B
      verified_date: '2026-05-09'
      doc_type: model_card
      summary: >-
        Full Training section with architecture (transformer decoder,
        GQA, NoPE), 3-stage data mixture (FineWeb-Edu, Stack v2,
        FineMath, etc.), hyperparameters (lr 2e-4, AdamW, WSD
        scheduler), hardware (384 H100s × 24 days), and links to
        intermediate checkpoints (SmolLM3-3B-checkpoints).
      sha256: e8415b25ecf7df9cd0bfadbe8ee482aa994e190e42a5f008b1805cc491f5bc76
    - url: https://huggingface.co/blog/smollm3
      verified_date: '2026-05-09'
      doc_type: blog
      summary: >-
        Engineering blueprint blog (July 8 2025) with pretraining
        recipe, ablations on GQA/NoPE/intra-doc masking, mid-training
        long-context extension methodology, SFT and APO post-training
        details, model-merging recipe.
      sha256: 8c364f7348d4025dbbce854664a4609b45f410382c418b7faeedba9830c77e98
    - url: https://huggingface.co/docs/hub/model-cards
      verified_date: '2026-05-09'
      doc_type: api_doc
      summary: >-
        Hugging Face Hub model-cards documentation — platform-wide
        standard mandating technical disclosure (model details,
        intended use, training data, evaluation, limitations) for
        all models on the Hub.
      sha256: 9cc0d300022351be2c307496514d38b9f3f4664ab3c7f12b9935c292ea66d7b6
  art_53_1_c_copyright_transparency:
    score: 3
    rationale: >-
      Best-in-class evidence and the only provider in this benchmark
      with a documented Art 53(1)(c) submission against the official
      EU template. SmolLM3 model card contains an explicit "EU Summary
      of Public Content" section linking to the European Commission's
      "Explanatory notice and template for the public summary of
      training content" for GPAI models. The summary is published in a
      dedicated Space (hfmlsoc/smollm3-eu-data-transparency) and cites
      every dataset used: FineWeb-Edu, DCLM, FineWeb2, FineWeb2-HQ,
      The Stack v2, StarCoder2 PRs, Stack-Edu, FineMath3+/4+,
      InfiWebMath3+/4+, MegaMath, OpenThoughts3-1.2M, Tulu3 preference
      mixture, Llama-Nemotron-Post-Training-Dataset. Each dataset is
      individually published on the Hub with its own data card. Score
      3 = full template-compliant disclosure.
    evidence:
    - url: https://huggingface.co/HuggingFaceTB/SmolLM3-3B
      verified_date: '2026-05-09'
      doc_type: model_card
      summary: >-
        Model card "EU Summary of Public Content" section: "The EU AI
        Act requires all GPAI models to provide a Public Summary of
        Training Content according to a given template" — links to
        EC template and to the dedicated transparency Space.
      sha256: fb52c5b9471eab9ed58dcf57d69e8cb97ca03946962165e0c1aa3c9fa50596e2
    - url: https://huggingface.co/spaces/hfmlsoc/smollm3-eu-data-transparency
      verified_date: '2026-05-09'
      doc_type: transparency_report
      summary: >-
        Dedicated Hugging Face Space publishing the full Art 53(1)(c)
        public summary of training content for SmolLM3, structured to
        the European Commission template.
      sha256: 09e56640cf8093bd4d8329aebbb76b206ccee56592826abf88f2188466ffccd7
    - url: https://huggingface.co/blog/smollm3
      verified_date: '2026-05-09'
      doc_type: blog
      summary: >-
        Blog details data mixture per training stage with exact
        weights: Stage 1 web 85% / code 12% / math 3% (FineWeb-Edu,
        DCLM, FineWeb2, Stack v2, FineMath3+); Stage 2 introduces
        Stack-Edu, FineMath4+, MegaMath; Stage 3 upsamples math/code
        plus OpenMathReasoning.
      sha256: 089737c5a656a6349de60c7f009a209de401abf17fea9570c5b54f6a33dc5dee
  art_53_1_d_e_downstream_obligations:
    score: 2
    rationale: >-
      SmolLM3 released under Apache 2.0 (model card License section),
      giving downstream deployers a permissive, well-understood
      license. Deployment guidance is explicit: vLLM, SGLang,
      llama.cpp, ONNX, MLX, MLC, ExecuTorch with code examples and
      recommended sampling parameters (temperature=0.6, top_p=0.95).
      Hugging Face Content Policy (effective April 10 2025) governs
      acceptable use — restricted-content categories (illegal,
      fraudulent, harmful/abusive, IP-violating, platform-abuse) and
      a DSA-compliant out-of-court dispute mechanism. Limitations
      note in model card warns downstream users to verify outputs.
      What's missing for score 3: no SmolLM3-specific acceptable-use
      addendum, no dedicated downstream-provider obligation document,
      no EU-AI-Act-aligned downstream notice. Score 2.
    evidence:
    - url: https://huggingface.co/HuggingFaceTB/SmolLM3-3B
      verified_date: '2026-05-09'
      doc_type: model_card
      summary: >-
        License section: Apache 2.0. Deployment instructions for
        vLLM, SGLang, llama.cpp, ONNX, MLX, MLC, ExecuTorch.
        Limitations section warns downstream users to verify
        outputs.
      sha256: 84d2f0b27b6d599a30020974c60d99e17d92ac8e6c08a2d3a28a5975c00ac01a
    - url: https://huggingface.co/content-policy
      verified_date: '2026-05-09'
      doc_type: terms_of_service
      summary: >-
        Hugging Face Content Policy (effective April 10 2025).
        Restricted Content categories: unlawful/illegal, fraudulent
        or malicious, harmful or abusive, privacy/IP violations,
        platform abuse. DSA-compliant out-of-court dispute
        settlement process.
      sha256: 0ec08b97619a442f515fd7a033af7c385553d38ac040a690a4bc3c189cbcbb9c
    - url: https://huggingface.co/terms-of-service
      verified_date: '2026-05-09'
      doc_type: terms_of_service
      summary: >-
        Terms of Service (effective Sep 15 2022). Open-source
        license preservation clause: "When Content contains notice
        of a reasonable and customary license (such as an open
        source license) such Content is intended to remain under
        the terms of such license." DMCA process and IP rules.
      sha256: 1e29583d06ff83c161086094479b139deeff86b8b75f39849304a180eabf944c
    - url: https://huggingface.co/code-of-conduct
      verified_date: '2026-05-09'
      doc_type: terms_of_service
      summary: >-
        Hugging Face Code of Conduct establishing community
        behavioral standards referenced from the Content Policy.
      sha256: ab7429ecb28975894f584992aafd9447d12df0ec468d3495aa7042bfcbc065bf
  art_55_systemic_risk:
    score: 0
    rationale: >-
      Not applicable. SmolLM3 (3B params, ~2e23 FLOPs) and other HF
      first-party models are well below the Article 51 systemic-risk
      threshold. Article 55 obligations (model evaluation, adversarial
      testing, systemic-risk assessment, incident reporting,
      cybersecurity) do not apply. Marked N/A; excluded from
      max_score via systemic_risk_threshold=false.
    evidence: []
