      archived_date: '2026-07-10'
  art_55_systemic_risk:
    score: 0
    rationale: >-
      Not applicable. SmolLM3 (3B params, ~2e23 FLOPs) and other HF
      first-party models are well below the Article 51 systemic-risk
      threshold. Article 55 obligations (model evaluation, adversarial
      testing, systemic-risk assessment, incident reporting,
      cybersecurity) do not apply. Marked N/A; excluded from
      max_score via systemic_risk_threshold=false.
    evidence: []
