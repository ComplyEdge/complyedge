provider_id: openai
provider_name: OpenAI
model_class: closed_api
systemic_risk_threshold: true
last_updated: '2026-07-10'
verification_status: needs_review

obligations:

  art_50_2_content_disclosure:
    score: 1
    rationale: >-
      OpenAI labels images from DALL·E with C2PA metadata and ships
      provenance in some surfaces, but text outputs are not machine-readable
      as AI-generated and the disclosure is not enforced in the API surface
      consumers must build it themselves.
    evidence:
    - url: https://help.openai.com/en/articles/8912793-c2pa-in-chatgpt-images
      verified_date: '2026-07-10'
      doc_type: other
      summary: >-
        OpenAI help center article documenting C2PA content credentials
        embedded in images generated by DALL·E 3 and ChatGPT image
        generation, including how to verify the credentials.
      sha256: fc70769243c5f2e805b2594958a931d5d10b429399fe67aed15a4e6bad356790
      wayback_url: https://web.archive.org/web/20260711000222/https://help.openai.com/en/articles/8912793-c2pa-in-chatgpt-images
      archived_date: '2026-07-10'
    - url: https://platform.openai.com/docs/guides/images
      verified_date: '2026-07-10'
      doc_type: api_doc
      summary: >-
        Image API docs do not require disclosure flags from the deployer;
        text completions API has no disclosure mechanism documented.

      sha256: c13ab0e7f35833dffb86da064b4a53b104fc0a4f9de023583459d75fb45f143b
      wayback_url: http://web.archive.org/web/20250915192709/https://platform.openai.com/docs/guides/images
      archived_date: '2026-07-10'
  art_51_model_classification:
    score: 1
    rationale: >-
      OpenAI has not published a formal Article 51 self-classification or
      AI Office notification. Compute estimates for GPT-4 class models
      exceed the 10^25 FLOPs threshold per third-party analysis (Epoch AI),
      but provider disclosure is absent.
    evidence:
    - url: https://epoch.ai/data/notable-ai-models
      verified_date: '2026-07-10'
      doc_type: other
      summary: >-
        Epoch AI estimates GPT-4 training compute at ~2e25 FLOPs,
        above the Article 51(2) systemic-risk threshold.
      sha256: d3d9e2996184540b4918566d098a9ac988c63703f752deb63cf42f8f6aa2e65e
      wayback_url: http://web.archive.org/web/20250714195046/https://epoch.ai/data/notable-ai-models
      archived_date: '2026-07-10'
    - url: https://openai.com/policies/usage-policies/
      verified_date: '2026-07-10'
      doc_type: terms_of_service
      summary: >-
        Usage policies do not reference EU AI Act Article 51 or AI
        Office notification.

      sha256: d926070745808feb5e6dbee5fcdc2a6332c5d21cd7b6437cb16e5c7cbfcb98bd
      wayback_url: http://web.archive.org/web/20260709021337/https://openai.com/policies/usage-policies/
      archived_date: '2026-07-10'
  art_52_53_1_a_b_technical_documentation:
    score: 2
    rationale: >-
      System cards exist for GPT-4, GPT-4o, GPT-4.5, and o-series models
      with capability descriptions, evaluation results, and red-team
      summaries. Training-data scope and parameter counts are not disclosed,
      which falls short of Annex XI requirements.
    evidence:
    - url: https://cdn.openai.com/papers/gpt-4-system-card.pdf
      verified_date: '2026-07-10'
      doc_type: model_card
      summary: GPT-4 system card with safety evaluations and red-team findings.
      sha256: ca3677e1b83e255aa1296d432d374378154f230f3c296b32ee67540d571b7004
      wayback_url: https://web.archive.org/web/20260709023638/https://cdn.openai.com/papers/gpt-4-system-card.pdf
      archived_date: '2026-07-10'
    - url: https://openai.com/index/gpt-4o-system-card/
      verified_date: '2026-07-10'
      doc_type: model_card
      summary: GPT-4o system card covering modalities and risk evaluations.

      sha256: 25ad4a68b676f41689897084dc6b032ae4cf34a65cf6a31054a0d7208d720dff
      wayback_url: http://web.archive.org/web/20260707191756/https://openai.com/index/gpt-4o-system-card/
      archived_date: '2026-07-10'
  art_53_1_c_copyright_transparency:
    score: 1
    rationale: >-
      OpenAI publishes a high-level statement on copyright and offers an
      OAI-SearchBot opt-out via robots.txt, but no operational rightsholder
      registry or TDM-reservation honoring mechanism is documented.
    evidence:
    - url: https://openai.com/index/openai-and-journalism/
      verified_date: '2026-07-10'
      doc_type: blog
      summary: >-
        Statement of position on copyright and licensing partnerships;
        no formal Article 53(1)(c) policy.
      sha256: 05f85003bb6f9a2183ec15dc2dfcea3c0b74b7a450a11eeef9df067e37bd63cf
      wayback_url: http://web.archive.org/web/20260621204825/https://openai.com/index/openai-and-journalism/
      archived_date: '2026-07-10'
    - url: https://platform.openai.com/docs/bots
      verified_date: '2026-07-10'
      doc_type: api_doc
      summary: Lists GPTBot, OAI-SearchBot, ChatGPT-User crawler identifiers and robots.txt opt-out.

      sha256: 601371ff545c0935e6f49e2f1ea766a1207e26a3560f103678dedf48c0e986f9
      wayback_url: http://web.archive.org/web/20260209024018/https://platform.openai.com/docs/bots
      archived_date: '2026-07-10'
  art_53_1_d_e_downstream_obligations:
    score: 2
    rationale: >-
      Comprehensive API and integration documentation exists for downstream
      developers (capabilities, limitations, safety guidance, prompt-engineering
      best practices). Training-data summary per the AI Office template is
      not yet published, awaiting the template itself.
    evidence:
    - url: https://platform.openai.com/docs
      verified_date: '2026-07-10'
      doc_type: api_doc
      summary: Full OpenAI API reference covering models, capabilities, limits, and safety guidance.
      sha256: f94e831fcf68b3d8c4dd737f1c747cc7322228660acaee23509839c519b264ec
      wayback_url: http://web.archive.org/web/20251122094014/https://platform.openai.com/docs
      archived_date: '2026-07-10'
    - url: https://openai.com/policies/usage-policies/
      verified_date: '2026-07-10'
      doc_type: terms_of_service
      summary: Usage policies enumerate prohibited downstream applications.

      sha256: 4f746f5ced6e7220de5249894818b26f55d89d57a293d56579aec437de40b22b
      wayback_url: https://web.archive.org/web/20260711000841/https://openai.com/policies/usage-policies/
      archived_date: '2026-07-10'
  art_55_systemic_risk:
    score: 2
    rationale: >-
      OpenAI publishes a Preparedness Framework and runs internal red-teaming
      with external evaluator partnerships. Incident reporting goes through
      a coordinated disclosure channel. Cybersecurity controls for model
      weights are documented at policy level but not externally audited.
    evidence:
    - url: https://openai.com/safety/preparedness/
      verified_date: '2026-07-10'
      doc_type: blog
      summary: Preparedness Framework describing capability evaluations and risk thresholds.
      sha256: 5be3487789e668594208a8e5e9f337a310095c6dceabc3d0d218bda2c08ce1ca
      wayback_url: http://web.archive.org/web/20240309160908/https://openai.com/safety/preparedness
      archived_date: '2026-07-10'
    - url: https://openai.com/global-affairs/disrupting-malicious-uses-of-ai/
      verified_date: '2026-07-10'
      doc_type: transparency_report
      summary: Periodic transparency reports on misuse and incident response.
      sha256: 17fe6ee8f48b743fb58451ecdaef2ecc2c2919745580f1af74a1b39d60a51364
      wayback_url: http://web.archive.org/web/20260324013127/https://openai.com/global-affairs/disrupting-malicious-uses-of-ai/
      archived_date: '2026-07-10'
