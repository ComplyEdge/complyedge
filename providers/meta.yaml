provider_id: meta
provider_name: Meta (Llama)
model_class: open_weights
systemic_risk_threshold: true
last_updated: '2026-05-09'
verification_status: needs_review

obligations:

  art_50_2_content_disclosure:
    score: 1
    rationale: >-
      Meta operates visible and invisible watermarking for images
      generated by the hosted Meta AI Imagine product, and joined the
      C2PA steering committee for content provenance standards. However,
      Llama models themselves are open-weights distributed; the model
      outputs from third-party deployers carry no built-in machine-readable
      AI-generated marking. Article 50(2) places obligations on providers
      of generative AI models, which Meta only partially satisfies through
      its own hosted product. Score is 1 (not 0) because at least the
      Meta AI hosted surface implements machine-readable marking via
      C2PA, and Meta is publicly engaged in industry-standard provenance
      work.
    evidence:
    - url: https://ai.meta.com/responsible-ai/
      verified_date: '2026-05-09'
      doc_type: blog
      summary: >-
        Connect 2024 responsible-AI page documenting visible and
        invisible watermarks on Meta AI Imagine images and Meta's
        membership of the C2PA steering committee for content
        provenance standards.

      sha256: ec7b7a52617296b26cf268932515b417323e8934afcb8c6089065af9dbc92c08
  art_51_model_classification:
    score: 2
    rationale: >-
      Meta publishes a formal Advanced AI Scaling Framework v2 (the
      Frontier AI Framework, 44-page PDF hosted on ai.meta.com)
      defining catastrophic-risk thresholds across three domains
      (Cybersecurity, Chemical & Biological, Loss of Control). The
      framework uses an outcomes-led threshold methodology with
      threat-modelling exercises, designates capability levels that
      trigger development or deployment halts pending validated
      safeguards, and describes per-model evaluation against threshold
      criteria. Per-model risk evaluations across CBRNE, violent crime,
      CSAM, and privacy domains for Llama 3.x are also documented on
      the AI at Meta responsible-AI page. Score is 2 (not 3) because
      the framework does not explicitly map its tiers to the EU AI Act
      Article 51(1)(a) compute threshold (10^25 FLOPs) or to the
      systemic-risk classification language of Annex XIII.
    evidence:
    - url: https://ai.meta.com/static-resource/Meta_Advanced-AI-Scaling-Framework-v2
      verified_date: '2026-05-09'
      doc_type: other
      summary: >-
        Meta's Advanced AI Scaling Framework v2 (44-page PDF, the
        renamed Frontier AI Framework) defining catastrophic risk
        outcomes and thresholds across Cybersecurity, Chemical &
        Biological, and Loss of Control domains, with governance,
        implementation, and per-model evaluation processes.
      sha256: d87aa9bf00456ec747e80b84216f9f2ffc427c1e98541f8b3c8f7f52c13c7b6a
    - url: https://ai.meta.com/responsible-ai/
      verified_date: '2026-05-09'
      doc_type: blog
      summary: >-
        Documents per-model risk evaluations for Llama 3.x including
        CBRNE, violent crime, CSAM, and privacy risk areas, with
        additional vision-input red-teaming for Llama 3.2.

      sha256: 2780b2059e63021d8046fa7c5c350c15f2323d75b8be6ecb5d08d997c8e36625
  art_52_53_1_a_b_technical_documentation:
    score: 3
    rationale: >-
      Meta publishes detailed Llama 4 model cards on llama.com and the
      meta-llama GitHub organisation, including Llama 4 Scout and
      Maverick specifications, capability ranges, supported languages,
      benchmark results, and limitations. The peer-reviewed "Llama 3
      Herd of Models" research publication provides extensive technical
      documentation of training methodology, safety evaluations, and
      capability assessments. Prompt-format documentation and per-model
      benchmark methodology pages exist for each generation. Documentation
      depth meets Annex XI expectations and is comparable to Anthropic
      and Google.
    evidence:
    - url: https://www.llama.com/docs/model-cards-and-prompt-formats/llama4/
      verified_date: '2026-05-09'
      doc_type: model_card
      summary: >-
        Llama 4 model card on llama.com documenting Scout and Maverick
        variants with active/total parameters, expert mixture
        architecture, multimodal capabilities, supported languages,
        context lengths, and prompt-format specifications.
      sha256: aab2bdb1586513b79661b9ad44b4d27b23d13548ff15a71ed857e45121e027df
    - url: https://github.com/meta-llama/llama-models/blob/main/models/llama4/MODEL_CARD.md
      verified_date: '2026-05-09'
      doc_type: model_card
      summary: >-
        Llama 4 model card on the official meta-llama GitHub
        organisation linked from llama.com, providing full technical
        specifications.
      sha256: 3aeafffd3126e1d7246571e93bca965f158278c5843f691fe6722e8aa407567a
    - url: https://ai.meta.com/research/publications/the-llama-3-herd-of-models/
      verified_date: '2026-05-09'
      doc_type: paper
      summary: >-
        "The Llama 3 Herd of Models" research publication on AI at
        Meta detailing training methodology, safety evaluation
        framework, and capability assessments across the Llama 3
        family.

      sha256: 498824f680b669fd39e18b64389562918f9e91a8dcd9b4d64b8843992998976c
  art_53_1_c_copyright_transparency:
    score: 2
    rationale: >-
      Meta operates a dedicated AI-training crawler (Meta-ExternalAgent)
      with documented robots.txt opt-out instructions, directly
      comparable to Google-Extended. The Meta Web Crawlers documentation
      explicitly states Meta uses "industry-standard practices like
      robots.txt rather than non-standard formats" and provides example
      User-agent disallow syntax. The Privacy Center generative-AI page
      documents that training inputs come from "publicly available
      sources on the internet or our own products and services" and
      that deleted information is excluded from future training rounds.
      Score is 2 (not 3) because Meta has not published a structured
      training-data summary in the EU AI Office template format, and
      the Llama 4 model cards do not enumerate dataset categories at
      the granularity Annex IX-style summaries require. The opt-out
      mechanism and deletion policy are documented; the affirmative
      summary is not.
    evidence:
    - url: https://developers.facebook.com/docs/sharing/bot/
      verified_date: '2026-05-09'
      doc_type: api_doc
      summary: >-
        Meta Web Crawlers documentation describing the
        Meta-ExternalAgent crawler used for "training foundation AI
        models or improving products by indexing content directly",
        with explicit robots.txt User-agent opt-out syntax and
        statement that Meta favours industry-standard robots.txt
        over non-standard NoAI tags.
      sha256: ab858841dfcab3c8bf38043a616cf17bc1a8b88b94ce61c467927dfbf37afd87
    - url: https://www.facebook.com/privacy/genai/
      verified_date: '2026-05-09'
      doc_type: blog
      summary: >-
        Privacy Center generative-AI hub describing Meta's training
        data sourcing approach and linking to the model-training
        dialog covering the deletion-respecting policy.
      sha256: 104a7f3fcdcadd601c203e851dc0144c3cde472073838e1d33bbd725c404a18c
    - url: https://www.facebook.com/privacy/dialog/how-generative-ai-models-work/
      verified_date: '2026-05-09'
      doc_type: blog
      summary: >-
        Privacy Center dialog stating training inputs come from
        "publicly available sources on the internet or our own
        products and services" and that "once it's deleted, it won't
        be used for future training".

      sha256: 8c3a3564ae96f1647d0f75747f737a3a9c2968bfe8dbcb2df3ca7437b5256aee
  art_53_1_d_e_downstream_obligations:
    score: 3
    rationale: >-
      Meta provides comprehensive downstream-deployer documentation:
      Llama 4 Acceptable Use Policy enumerating prohibited uses across
      five categories (illegal activity, bodily-harm risks, deception,
      failure to disclose AI use, third-party tool misuse); Llama 4
      Community License with attribution and naming requirements;
      Responsible Use Guide / Developer Use Guide; system-level
      safeguard tooling (Llama Guard, Prompt Guard, Code Shield,
      LlamaFirewall) released as open source with model cards. The
      AUP explicitly carves out EU restrictions on multimodal Llama 4
      rights for EU-domiciled developers, signalling regulatory
      awareness. Comparable depth to Anthropic and Google.
    evidence:
    - url: https://www.llama.com/llama4/use-policy/
      verified_date: '2026-05-09'
      doc_type: terms_of_service
      summary: >-
        Llama 4 Acceptable Use Policy enumerating prohibited downstream
        uses (illegal activity, weapons/CBRNE, deception, failure to
        disclose AI use) plus EU-specific rights restriction for
        multimodal models.
      sha256: 09c6912b5c353a71687c5cc9b1a2a80af9156c3da7907c8291f743471df8e7df
    - url: https://www.llama.com/llama4/license/
      verified_date: '2026-05-09'
      doc_type: terms_of_service
      summary: >-
        Llama 4 Community License Agreement (effective April 5, 2025)
        with attribution, naming, and 700M-MAU commercial-licensing
        provisions. Section 1.b.iv incorporates the AUP by reference.
      sha256: 18391a432c188df1b89c4a0ae03c24d459412e345e9fed29f416b74dcf3ad460
    - url: https://www.llama.com/llama-protections/
      verified_date: '2026-05-09'
      doc_type: api_doc
      summary: >-
        Llama Protections overview documenting Llama Guard 4, Prompt
        Guard 2, Code Shield, and LlamaFirewall as system-level
        safeguards available to downstream deployers.

      sha256: ed6175404d886aae325fdb3d089c7f1ec71b71ef455cecbe18ab0ca97fdb617e
  art_55_systemic_risk:
    score: 3
    rationale: >-
      Meta meets all four pillars of Article 55 systemic-risk
      obligations: (a) formal risk-management framework — Advanced AI
      Scaling Framework v2 defines catastrophic outcomes and threshold
      methodology across Cybersecurity, Chemical & Biological, and
      Loss of Control with explicit governance, threat-modelling, and
      development/deployment halt criteria; (b) capability evaluations
      and red-teaming — CyberSec Eval 1-4 (industry's most
      comprehensive open-source LLM cybersecurity evaluation suite),
      AutoPatchBench, CyberSOCEval, plus CBRNE evaluations for
      Llama 3.x; (c) systemic incident mitigation tooling — Llama
      Guard 4, Prompt Guard 2, Code Shield, LlamaFirewall released as
      production-grade open-source safeguards; (d) external
      partnerships and information-sharing — MLCommons AI Safety
      Working Group, AI Alliance, CrowdStrike (SOC evaluations).
    evidence:
